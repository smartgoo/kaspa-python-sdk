name: Release
on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            manylinux: auto
          - target: aarch64
            manylinux: manylinux_2_28
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --strip --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          sccache: 'true'
          before-script-linux: |
            # Install OpenSSL development packages in manylinux container
            if command -v yum &> /dev/null; then
              yum install -y openssl-devel perl-IPC-Cmd
            elif command -v apk &> /dev/null; then
              apk add openssl-dev
            elif command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y libssl-dev pkg-config
            fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/

  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}-apple-darwin
          args: --release --strip --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          sccache: 'true'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --strip --out dist --interpreter 3.10 3.11 3.12 3.13 3.14
          sccache: 'true'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist/

  upload-to-release:
    name: Upload Wheels to GitHub Release
    needs: [build-linux, build-macos, build-windows]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: artifacts
          merge-multiple: true

      - name: List wheels
        run: ls -la artifacts/

      - name: Upload wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.whl
